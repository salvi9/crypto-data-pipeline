name: Pipeline Smoke Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crypto_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crypto_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: crypto_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-dotenv psycopg2-binary pytest

      - name: Install Airflow for DAG import test
        run: |
          AIRFLOW_VERSION=2.7.3
          PYTHON_VERSION=3.11
          CONSTRAINT_URL="https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${PYTHON_VERSION}.txt"
          pip install "apache-airflow==${AIRFLOW_VERSION}" --constraint "${CONSTRAINT_URL}"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres -d crypto_db && break
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Bootstrap schema
        run: |
          psql "postgresql://postgres:postgres@localhost:5432/crypto_db" -f tests/schema.sql

      - name: Run pipeline smoke test
        run: |
          python tests/test_pipeline_smoke.py

      - name: Run DAG import test
        run: |
          python - <<'PY'
          import importlib.util
          from pathlib import Path

          dag_file = Path("dags/crypto_pipeline_dag.py")
          spec = importlib.util.spec_from_file_location("crypto_pipeline_dag", dag_file)
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)

          dag = getattr(module, "dag", None)
          assert dag is not None
          assert dag.dag_id == "crypto_data_pipeline"
          expected = {"bronze_ingest", "silver_clean", "gold_aggregate"}
          assert expected.issubset(set(dag.task_dict.keys()))
          print("DAG import test passed")
          PY
      
      - name: Run negative-path test
        run: |
            python tests/test_negative_paths.py

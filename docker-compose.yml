version: '3.8'

services:
  postgres:
    image: postgres:13
    env_file:
      - .env
    volumes:
      - postgres_db_volume:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  airflow-webserver:
    image: apache/airflow:2.7.3
    entrypoint: /bin/bash
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://crypto_user:SuperSecureP%40ssw0rd2026%21@postgres/crypto_db
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__ENABLE_XCOM_PICKLING: 'true'
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      PYTHONPATH: /opt/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./.env:/opt/airflow/.env
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - airflow-init
    command:
      - -c
      - pip install --no-cache-dir python-dotenv psycopg2-binary requests && airflow webserver

  airflow-scheduler:
    image: apache/airflow:2.7.3
    entrypoint: /bin/bash
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://crypto_user:SuperSecureP%40ssw0rd2026%21@postgres/crypto_db
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__ENABLE_XCOM_PICKLING: 'true'
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      PYTHONPATH: /opt/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./.env:/opt/airflow/.env
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    depends_on:
      - postgres
      - airflow-init
    command:
      - -c
      - pip install --no-cache-dir python-dotenv psycopg2-binary requests && airflow scheduler

  airflow-init:
    image: apache/airflow:2.7.3
    entrypoint: /bin/bash
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://crypto_user:SuperSecureP%40ssw0rd2026%21@postgres/crypto_db
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__ENABLE_XCOM_PICKLING: 'true'
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      PYTHONPATH: /opt/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./.env:/opt/airflow/.env
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    depends_on:
      - postgres
    command:
      - -c
      - >-
        pip install --no-cache-dir python-dotenv psycopg2-binary requests &&
        airflow db init &&
        airflow users create --role Admin --username admin --password admin --firstname Local --lastname User --email admin@example.com || true

volumes:
  postgres_db_volume: